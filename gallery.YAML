# Write a short, attention-grabbing description of your project.
desc: >
  Imposter is a word-guessing game where you're the imposter — you don't know
  the secret word. Other players give each other one-word hints about a word
  you can't see, and you have to figure it out from context before anyone
  votes you out.

  The game supports 3–8 players, a real-time hint phase, a voting round, and
  score tracking across multiple games.
